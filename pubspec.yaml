name: flutter_lite_lm
description: Flutter plugin for Google's LiteRT-LM — run Large Language Models on-device with GPU/NPU acceleration. Supports Gemma, Llama, Phi, Qwen and more.
version: 0.1.0
homepage: https://github.com/songhieutran/flutter_lite_lm
repository: https://github.com/songhieutran/flutter_lite_lm
issue_tracker: https://github.com/songhieutran/flutter_lite_lm/issues

environment:
  sdk: ^3.11.4
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.songhieu.flutter_lite_lm
        pluginClass: FlutterLiteLmPlugin
      ios:
        pluginClass: FlutterLiteLmPlugin
