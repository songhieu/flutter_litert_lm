name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-and-test:
    name: Analyze & test (Dart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve plugin dependencies
        run: flutter pub get

      - name: Resolve example dependencies
        run: flutter pub get
        working-directory: example

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Static analysis
        run: flutter analyze

      - name: Run unit tests
        run: flutter test

  build-android:
    name: Build example APK (Android)
    runs-on: ubuntu-latest
    needs: analyze-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve example dependencies
        run: flutter pub get
        working-directory: example

      # The release build is the one that actually shakes out R8/Proguard
      # issues with the LiteRT-LM JNI surface — debug builds skip shrinking,
      # so a green debug build wouldn't catch the regression that motivated
      # consumer-rules.pro in the first place.
      - name: Build release APK
        run: flutter build apk --release
        working-directory: example
